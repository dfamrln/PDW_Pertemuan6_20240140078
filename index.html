<!DOCTYPE html>
<html lang="en">

<head>

    <title>Arcane</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">

    <meta charset="UTF-8">

</head>

<body>

    <div class="container">

        <h1>Arcane: League of Legends</h1>

        <section>

            <h2 id="video">Arcane Video</h2>

            <video controls>

        </section>


        <section>

            <h2 id="audio">Arcane Music</h2>

            <audio controls>

                <source src="ComePlay.mp3" type="audio/mp3">

            </audio>

        </section>


        <section>

            <h2 id="gambar">Arcane Characters</h2>

            <div class="image-container">

                <img src="VI.jpg">

            </div>

        </section>

    <script src="script.js"></script>

</html>
